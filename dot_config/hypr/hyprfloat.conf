# Hyprfloat configuration - floating window manager for Hyprland
# https://github.com/yz778/hyprfloat

# =============================================================================
# ALT-Tab Window Switcher Configuration
# =============================================================================

# ALT-Tab keybindings
bind = ALT, TAB,               exec, hyprfloat alttab next
bind = ALT_SHIFT, TAB,         exec, hyprfloat alttab prev
bind = ALT, GRAVE,             exec, hyprfloat alttab next sameclass
bind = ALT_SHIFT, GRAVE,       exec, hyprfloat alttab prev sameclass

# =============================================================================
# Window Rules for Hyprfloat UI Elements
# =============================================================================

# Alt-tab and other floating UI elements
windowrule = float,               title:^(hyprfloat:.*)$
windowrule = noanim,              title:^(hyprfloat:.*)$
windowrule = pin,                 title:^(hyprfloat:alttab)$
windowrule = size 0 0,            title:^(hyprfloat:alttab)$
windowrule = stayfocused,         title:^(hyprfloat:alttab)$
windowrule = bordersize 0,        title:^(hyprfloat:dummy)$
windowrule = size 0 0,            title:^(hyprfloat:dummy)$

# =============================================================================
# Window Styling - Different borders for floating vs tiling modes
# =============================================================================

# Floating windows: green → cyan gradient border
windowrule = bordercolor rgba(00ff99ee) rgba(33ccffee) 45deg, floating:1
windowrule = bordersize 2, floating:1

# Tiling windows: cyan → green gradient border
windowrule = bordercolor rgba(33ccffee) rgba(00ff99ee) 45deg, floating:0
windowrule = bordersize 5, floating:0

# Overview mode: gold → orange gradient border
windowrule = bordercolor rgba(ffd700ee) rgba(ff8c00ee) 45deg, tag:overview
windowrule = bordersize 5, tag:overview

# =============================================================================
# Main Hyprfloat Controls
# =============================================================================

# Toggle workspace overview (GNOME-style)
bind = SUPER, BACKSLASH,       exec, hyprfloat overview

# Toggle floating mode for all windows in workspace
bind = SUPER_SHIFT, BACKSLASH, exec, hyprfloat togglefloat

# Dynamic directional focus/snapping (adapts to floating/tiling/overview mode)
bind = SUPER, UP,              exec, hyprfloat dynamicbind SUPER_UP
bind = SUPER, DOWN,            exec, hyprfloat dynamicbind SUPER_DOWN
bind = SUPER, LEFT,            exec, hyprfloat dynamicbind SUPER_LEFT
bind = SUPER, RIGHT,           exec, hyprfloat dynamicbind SUPER_RIGHT

# =============================================================================
# Window Snapping - Snap to screen fractions (top row)
# =============================================================================

# Super + Numpad-like positions (using INSERT/HOME/etc as alternatives)
bind = SUPER, INSERT,          exec, hyprfloat snap 0.0   0.0   0.0   0.5   # Top-left quarter
bind = SUPER, HOME,            exec, hyprfloat snap 0.0   1.0   0.0   0.5   # Top half
bind = SUPER, PAGE_UP,         exec, hyprfloat snap 0.7   1.0   0.0   0.5   # Top-right quarter

# =============================================================================
# Window Snapping - Bottom row
# =============================================================================

bind = SUPER, DELETE,          exec, hyprfloat snap 0.0   0.3   0.5   1.0   # Bottom-left small
bind = SUPER, END,             exec, hyprfloat snap 0.0   1.0   0.5   1.0   # Bottom half
bind = SUPER, PAGE_DOWN,       exec, hyprfloat snap 0.7   1.0   0.5   1.0   # Bottom-right quarter

# =============================================================================
# Window Snapping - Shift modifier (larger areas)
# =============================================================================

bind = SUPER_SHIFT, INSERT,    exec, hyprfloat snap 0.0   0.7   0.0   1.0   # Left 70%
bind = SUPER_SHIFT, HOME,      exec, hyprfloat snap 0.2   0.8   0.0   1.0   # Center 60%
bind = SUPER_SHIFT, PAGE_UP,   exec, hyprfloat snap 0.7   1.0   0.0   1.0   # Right 30%
bind = SUPER_SHIFT, UP,        exec, hyprfloat snap 0.0   1.0   0.0   1.0   # Full screen

# =============================================================================
# Multi-monitor Controls
# =============================================================================

# Move window to previous/next monitor
bind = SUPER_SHIFT, LEFT,      exec, hyprfloat movemon -1
bind = SUPER_SHIFT, RIGHT,     exec, hyprfloat movemon +1

# Center and scale window
bind = SUPER_SHIFT, DOWN,      exec, hyprfloat center 1.00

# =============================================================================
# Workspace Groups (for multi-monitor setups)
# =============================================================================

# Cycle through workspace groups
bind = SUPER_CTRL, LEFT,       exec, hyprfloat workspacegroup prev
bind = SUPER_CTRL, RIGHT,      exec, hyprfloat workspacegroup next

# Jump to specific workspace group
bind = SUPER_CTRL, INSERT,     exec, hyprfloat workspacegroup group 1
bind = SUPER_CTRL, HOME,       exec, hyprfloat workspacegroup group 2
bind = SUPER_CTRL, PAGE_UP,    exec, hyprfloat workspacegroup group 3

# Move window to different workspace group
bind = SUPER_CTRL, M,          exec, hyprfloat workspacegroup move
