# ----------------------------------------------------- 
# Keybinds
# ----------------------------------------------------- 
# ############################ Windows and Workspaces ##############################
$ws=~/.config/ags/scripts/hyprland/workspace_action.sh
$confirm_exit=~/.config/hypr/scripts/confirm_exit.sh
# Main modifier
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, alacritty
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, wlogout
# bind = $mainMod, E, exec, foot dolphin
bind = $mainMod, E, exec, ~/.config/hypr/scripts/toggle_window.sh yazi
bind = $mainMod, F, togglefloating, 
bind = $mainMod, SPACE, exec, wofi --show drun
bind = $mainMod, r, exec, hyprctl reload
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod SHIFT, O, exec, hyprlock
bind = $mainMod SHIFT, S, exec, hyprshot -m region
bind = $mainMod SHIFT, A, exec, ~/.config/hypr/scripts/toggle_window.sh pavucontrol
bind = $mainMod SHIFT, J, togglesplit, # dwindle
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/monitor_hotplug.sh  # Fix monitor configuration

# Simlar Copy/Paste to Mac
binde = $mainMod, C, sendshortcut, CTRL, C,
binde = $mainMod, V, sendshortcut, CTRL, V,

bind = $mainMod CTRL, F, fullscreen,

# Traverse workspaces on focused monitor with mainMod + ,/.
bind = $mainMod, l, workspace, r+1
bind = $mainMod, h, workspace, r-1

# Move active window to a workspace with mainMod + CTRL + vim keys
bind = $mainMod CTRL, l, movetoworkspace, r
bind = $mainMod CTRL, h, movetoworkspace, l

# Move focus with mainMod + vim keys
bind = $mainMod SHIFT, h, movefocus, l
bind = $mainMod SHIFT, l, movefocus, r
bind = $mainMod SHIFT, k, movefocus, u
bind = $mainMod SHIFT, j, movefocus, d

# Move active window with mainMod + SHIFT + vim keys
bind = $mainMod CTRL SHIFT, l, movewindow, r
bind = $mainMod CTRL SHIFT, h, movewindow, l

# # Focus monitor with mainMod + SHIFT + vim keys
# bind = $mainMod SHIFT, h, focusmonitor, l
# bind = $mainMod SHIFT, l, focusmonitor, r

# # Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod CTRL, 3, exec, $HOME/.config/hypr/scripts/toggle_monitor.sh
bind = $mainMod CTRL, P, exec, ~/.config/hypr/scripts/set_primary_monitor.sh  # Set DP-3 as primary for XWayland apps

bind = $mainMod CTRL, W, exec, pkill waybar && waybar &
